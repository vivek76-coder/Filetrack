<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-[500px] bg-white rounded-lg p-4">
        <div class="flex justify-center items-center p-2 text-indigo-400 gap-2">
            <i class="ri-route-fill text-2xl"></i>
            <h1 class="font-semibold">FileTrack</h1>
        </div>
        <div class="h-px border border-gray-100 -mx-4"></div>
        <form class="p-4" action="/signup" method="POST">

            <div class="space-y-1">
                <label class="text-medium block text-gray-900">Name</label>
                <input type="text" class="border  border-gray-300 rounded w-full p-2" name="fullname" placeholder="Enter your name" required />
            </div>

            <div class="space-y-1">
                <label class="text-medium block text-gray-900">Email</label>
                <input type="email" class="border  border-gray-300 rounded w-full p-2" name="email" placeholder="Enter your email" required />
            </div>

             <div class="space-y-1">
                <label class="text-medium block text-gray-900">Mobile No.</label>
                <input type="text" class="border  border-gray-300 rounded w-full p-2" name="mobile" placeholder="Enter mobile number" required />
            </div>

             <div class="space-y-1">
                <label class="text-medium block text-gray-900">Address</label>
                <input type="text" class="border  border-gray-300 rounded w-full p-2" name="address" placeholder="Enter address here" required />
            </div>

             <div class="space-y-1">
                <label class="text-medium block text-gray-900">Password</label>
                <input type="password" class="border  border-gray-300 rounded w-full p-2" name="password" placeholder="Enter password here" required />
            </div>

             <div class="space-y-1">
                <label class="text-medium block text-gray-900">Confirm Password</label>
                <input type="password" class="border  border-gray-300 rounded w-full p-2" name="confirmPassword" placeholder="Confirm password here" required />
            </div>

            <button type="submit" class="w-full bg-indigo-400 text-white p-2 rounded mt-4 hover:bg-indigo-500 cursor-pointer">Submit</button>
            
        </form>
    </div>
</body>
</html>
