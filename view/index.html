<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-[400px] bg-white rounded-lg p-4">
        <div class="flex justify-center items-center p-2 text-indigo-400 gap-2">
            <i class="ri-route-fill text-2xl"></i>
            <h1 class="font-semibold">FileTrack</h1>
        </div>
        <div class="h-px border border-gray-100 -mx-4"></div>
        <form class="p-4">
            <div class="space-y-1">
                <label class="text-medium block text-gray-900">Email</label>
                <input type="email" class="border  border-gray-300 rounded w-full p-2" name="email" placeholder="abc@gmail.com" required />
            </div>
            <div class="space-y-1">
                <label class="text-medium block text-gray-900">Password</label>
                <input type="password" class="border  border-gray-300 rounded w-full p-2" name="password" placeholder="Enter password here" required />
            </div>
            <button type="submit" class="w-full bg-indigo-400 text-white p-2 rounded mt-4 hover:bg-indigo-500 cursor-pointer">Login</button>
        </form>
        <div>
            <p class="text-center text-gray-500">Dont have an account?<a class="text-green-500 cursor-pointer" href="#">Sign Up</a></p>
        </div>
    </div>
</body>
</html>
